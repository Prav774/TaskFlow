{% extends 'base.html' %}

{% block title %}Reset Password - TaskFlow{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-fade-in">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gradient mb-2">TaskFlow</h1>
            <p class="text-gray-400">Reset your password</p>
        </div>
        
        <div class="glass-card p-8">
            <h2 class="text-2xl font-semibold text-center mb-6">Forgot Password?</h2>
            <p class="text-gray-400 text-center mb-6">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-3 rounded-lg bg-white/10 border border-white/20 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
                           placeholder="Enter your email">
                </div>
                
                <button type="submit" class="btn-primary w-full">Send Reset Link</button>
            </form>
            
            <div class="mt-6 text-center">
                <a href="{% url 'accounts:login' %}" class="text-sm text-purple-400 hover:text-purple-300">
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
