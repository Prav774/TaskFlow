{% extends 'base.html' %}

{% block title %}Password Reset Sent - TaskFlow{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-fade-in">
        <div class="glass-card p-8 text-center">
            <svg class="w-16 h-16 mx-auto text-green-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <h2 class="text-2xl font-semibold mb-4">Check Your Email</h2>
            <p class="text-gray-400 mb-6">We've sent password reset instructions to your email address.</p>
            <a href="{% url 'accounts:login' %}" class="btn-secondary">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
