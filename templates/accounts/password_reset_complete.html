{% extends 'base.html' %}

{% block title %}Password Reset Complete - TaskFlow{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-fade-in">
        <div class="glass-card p-8 text-center">
            <svg class="w-16 h-16 mx-auto text-green-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <h2 class="text-2xl font-semibold mb-4">Password Reset Complete</h2>
            <p class="text-gray-400 mb-6">Your password has been reset successfully.</p>
            <a href="{% url 'accounts:login' %}" class="btn-primary">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
